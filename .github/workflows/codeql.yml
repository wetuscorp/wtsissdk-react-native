name: CodeQL
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '37 3 * * 1'
permissions:
  actions: read
  contents: read
  security-events: write
jobs:
  javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: github/codeql-action/init@v4
        with: { languages: javascript-typescript }
      - uses: github/codeql-action/analyze@v4
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/checkout@v5
        with: { repository: wetuscorp/wtsissdk-android, path: native-android }
      - uses: actions/setup-node@v6
        with: { node-version: '24', cache: npm }
      - uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: '17' }
      - uses: github/codeql-action/init@v4
        with: { languages: java-kotlin, build-mode: manual }
      - run: cd native-android && ./gradlew :sdk:publishToMavenLocal
      - run: npm ci && cd example && npm ci && cd android && ./gradlew assembleDebug
      - uses: github/codeql-action/analyze@v4
  ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/checkout@v5
        with: { repository: wetuscorp/wtsissdk-swift, path: native-swift }
      - uses: actions/setup-node@v6
        with: { node-version: '24', cache: npm }
      - uses: github/codeql-action/init@v4
        with: { languages: swift, build-mode: manual }
      - run: npm ci && cd example && npm ci
      - run: cd example/ios && pod install
        env: { WTS_SDK_SWIFT_PATH: "${{ github.workspace }}/native-swift" }
      - run: xcodebuild -workspace example/ios/WtsSdkExample.xcworkspace -scheme WtsSdkExample -sdk iphonesimulator -configuration Debug -derivedDataPath /tmp/wts-rn-codeql CODE_SIGNING_ALLOWED=NO build
      - uses: github/codeql-action/analyze@v4
