name: Release
on:
  push:
    tags: ['*.*.*']
permissions:
  contents: write
  id-token: write
jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with: { node-version: '24', registry-url: 'https://registry.npmjs.org', cache: npm }
      - run: test "$GITHUB_REF_NAME" = "$(node -p 'require("./package.json").version')"
      - run: npm ci && npm run contracts:verify && npm run typecheck && npm test -- --runInBand && npm run build && npm run pack:check
      - name: Check npm registry
        id: npm_registry
        env:
          PACKAGE_NAME: '@wetusco/wts-sdk'
          PACKAGE_VERSION: ${{ github.ref_name }}
        run: |
          if test "$(npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version 2>/dev/null || true)" = "${PACKAGE_VERSION}"; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.npm_registry.outputs.published != 'true'
        run: npm publish --access public --tag next --provenance
      - name: Create GitHub release
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 && exit 0
          release_flags=()
          [[ "$GITHUB_REF_NAME" == *-* ]] && release_flags+=(--prerelease)
          gh release create "$GITHUB_REF_NAME" --generate-notes --verify-tag "${release_flags[@]}"
        env: { GH_TOKEN: "${{ github.token }}" }
