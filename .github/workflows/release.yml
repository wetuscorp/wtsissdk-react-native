name: Release
on:
  push:
    tags: ['*.*.*']
permissions:
  contents: write
  id-token: write
jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with: { node-version: '24', registry-url: 'https://registry.npmjs.org', cache: npm }
      - run: test "$GITHUB_REF_NAME" = "$(node -p 'require("./package.json").version')"
      - run: npm ci && npm run contracts:verify && npm run typecheck && npm test -- --runInBand && npm run build && npm run pack:check
      - run: npm publish --access public --tag next --provenance
      - run: gh release create "$GITHUB_REF_NAME" --generate-notes --verify-tag
        env: { GH_TOKEN: "${{ github.token }}" }
